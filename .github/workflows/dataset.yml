name: "Update dataset"
on:
    schedule:
        - cron: "0 12 * * *"
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: apps/dataset
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup cache
              uses: actions/cache@v4
              with:
                  path: |
                    ~/.bun/install/cache
                    node_modules
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
                  restore-keys: |
                    ${{ runner.os }}-bun-

            - name: Install app dependencies
              run: bun install

            - name: Update S3 dataset
              run: bun run start
              env:
                  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
                  S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
                  S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

    build-extra-tier:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: apps/dataset
        strategy:
            matrix:
                tier:
                    - challenger
                    - grandmaster
                    - grandmaster_plus
                    - master
                    - master_plus
                    - diamond
                    - diamond_plus
                    - emerald
                    - platinum_plus
                    - platinum
                    - gold_plus
                    - gold
                    - silver
                    - bronze
                    - iron
                    - all
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup cache
              uses: actions/cache@v4
              with:
                  path: |
                    ~/.bun/install/cache
                    node_modules
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
                  restore-keys: |
                    ${{ runner.os }}-bun-

            - name: Install app dependencies
              run: bun install

            - name: Build dataset
              run: bun run start
              env:
                  TIER: ${{ matrix.tier }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dataset-${{ matrix.tier }}
                  path: apps/dataset/output/${{ matrix.tier }}/

    publish-extra-tiers:
        runs-on: ubuntu-latest
        needs: build-extra-tier
        permissions:
            contents: write
        env:
            GH_REPO: ${{ github.repository }}
        steps:
            - name: Download all tier artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: dataset-*
                  path: datasets/

            - name: Rename files for release
              run: |
                  for dir in datasets/dataset-*/; do
                    tier="${dir#datasets/dataset-}"
                    tier="${tier%/}"
                    cp "${dir}current-patch.json" "${tier}-current-patch.json"
                    cp "${dir}30-days.json" "${tier}-30-days.json"
                  done

            - name: Create datasets release if not exists
              run: |
                  gh release view datasets 2>/dev/null || \
                  gh release create datasets \
                    --title "Datasets" \
                    --notes "Auto-updated tier datasets. Refreshed daily." \
                    --prerelease
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload datasets to release
              run: gh release upload datasets *-current-patch.json *-30-days.json --clobber
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
