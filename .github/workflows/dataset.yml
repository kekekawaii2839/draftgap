name: "Update dataset"
on:
    schedule:
        - cron: "0 12 * * *"
    workflow_dispatch:

defaults:
    run:
        working-directory: apps/dataset

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup cache
              uses: actions/cache@v4
              with:
                  path: |
                    ~/.bun/install/cache
                    node_modules
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
                  restore-keys: |
                    ${{ runner.os }}-bun-

            - name: Install app dependencies
              run: bun install

            - name: Update S3 dataset
              run: bun run start
              env:
                  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
                  S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
                  S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

    publish-extra-tiers:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup cache
              uses: actions/cache@v4
              with:
                  path: |
                    ~/.bun/install/cache
                    node_modules
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
                  restore-keys: |
                    ${{ runner.os }}-bun-

            - name: Install app dependencies
              run: bun install

            - name: Build diamond_plus dataset
              run: bun run start
              env:
                  TIER: diamond_plus

            - name: Build gold_plus dataset
              run: bun run start
              env:
                  TIER: gold_plus

            - name: Rename files for release
              run: |
                  cp output/diamond_plus/current-patch.json diamond_plus-current-patch.json
                  cp output/diamond_plus/30-days.json diamond_plus-30-days.json
                  cp output/gold_plus/current-patch.json gold_plus-current-patch.json
                  cp output/gold_plus/30-days.json gold_plus-30-days.json

            - name: Create datasets release if not exists
              run: |
                  gh release view datasets 2>/dev/null || \
                  gh release create datasets \
                    --title "Datasets" \
                    --notes "Auto-updated tier datasets (Diamond+ and Gold+). Refreshed daily." \
                    --prerelease
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload datasets to release
              run: |
                  gh release upload datasets \
                    diamond_plus-current-patch.json \
                    diamond_plus-30-days.json \
                    gold_plus-current-patch.json \
                    gold_plus-30-days.json \
                    --clobber
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
